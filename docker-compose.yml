version: "3.9"

networks:
  umf_network:
    driver: bridge

volumes:
  postgres_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: umf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: umfuser
      POSTGRES_PASSWORD: umfpassword
      POSTGRES_DB: umfdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - umf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umfuser -d umfdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  htmx:
    image: nginx:alpine
    container_name: umf_htmx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/htmx:/usr/share/nginx/html:ro
    networks:
      - umf_network

  laravel:
    build:
      context: ./backend/laravel
      dockerfile: Dockerfile
    container_name: umf_laravel
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: umfdb
      DB_USERNAME: umfuser
      DB_PASSWORD: umfpassword
      APP_KEY: base64:CHANGE_ME_LARAVEL_KEY_32CHARS==
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umf_network

  actix:
    build:
      context: ./backend/actix
      dockerfile: Dockerfile
    container_name: umf_actix
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://umfuser:umfpassword@postgres:5432/umfdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umf_network

  aspnet:
    build:
      context: ./backend/aspnet
      dockerfile: Dockerfile
    container_name: umf_aspnet
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: Host=postgres;Port=5432;Database=umfdb;Username=umfuser;Password=umfpassword
      ASPNETCORE_URLS: http://+:8003
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umf_network

  fastapi:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    container_name: umf_fastapi
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://umfuser:umfpassword@postgres:5432/umfdb
      SECRET_KEY: CHANGE_ME_FASTAPI_SECRET
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umf_network

  drogon:
    build:
      context: ./backend/drogon
      dockerfile: Dockerfile
    container_name: umf_drogon
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: umfdb
      PG_USER: umfuser
      PG_PASSWORD: umfpassword
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umf_network

  jetzig:
    build:
      context: ./backend/jetzig
      dockerfile: Dockerfile
    container_name: umf_jetzig
    restart: unless-stopped
    ports:
      - "8006:8006"
    networks:
      - umf_network

  zylix:
    build:
      context: ./backend/zylix
      dockerfile: Dockerfile
    container_name: umf_zylix
    restart: unless-stopped
    ports:
      - "8007:8007"
    networks:
      - umf_network

  lightbug:
    build:
      context: ./backend/lightbug
      dockerfile: Dockerfile
    container_name: umf_lightbug
    restart: unless-stopped
    ports:
      - "8008:8008"
    networks:
      - umf_network

databases:
  - name: umf-postgres
    databaseName: umfdb
    user: umfuser
    plan: free

services:

  - type: web
    name: umf-laravel
    env: docker
    dockerfilePath: ./backend/laravel/Dockerfile
    dockerContext: ./backend/laravel
    plan: free
    healthCheckPath: /
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: umf-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: umf-postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: umf-postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: umf-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: umf-postgres
          property: password
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"

  - type: web
    name: umf-actix
    env: docker
    dockerfilePath: ./backend/actix/Dockerfile
    dockerContext: ./backend/actix
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: umf-postgres
          property: connectionString

  - type: web
    name: umf-aspnet
    env: docker
    dockerfilePath: ./backend/aspnet/Dockerfile
    dockerContext: ./backend/aspnet
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: umf-postgres
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  - type: web
    name: umf-fastapi
    env: docker
    dockerfilePath: ./backend/fastapi/Dockerfile
    dockerContext: ./backend/fastapi
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: umf-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: umf-drogon
    env: docker
    dockerfilePath: ./backend/drogon/Dockerfile
    dockerContext: ./backend/drogon
    plan: free
    healthCheckPath: /

  - type: web
    name: umf-jetzig
    env: docker
    dockerfilePath: ./backend/jetzig/Dockerfile
    dockerContext: ./backend/jetzig
    plan: free
    healthCheckPath: /

  - type: web
    name: umf-zylix
    env: docker
    dockerfilePath: ./backend/zylix/Dockerfile
    dockerContext: ./backend/zylix
    plan: free
    healthCheckPath: /

  - type: web
    name: umf-lightbug
    env: docker
    dockerfilePath: ./backend/lightbug/Dockerfile
    dockerContext: ./backend/lightbug
    plan: free
    healthCheckPath: /
